name: Release DMG

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install project generator dependency
        run: gem install xcodeproj

      - name: Regenerate Xcode project
        run: ruby tools/generate_xcodeproj.rb

      - name: Build release app
        run: |
          xcodebuild \
            -project gtop.xcodeproj \
            -scheme gtop \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            build

      - name: Package DMG
        run: |
          mkdir -p dist
          APP_PATH="build/DerivedData/Build/Products/Release/gtop.app"
          VERSION_NAME="${GITHUB_REF_NAME:-manual}"
          OUTPUT_PATH="dist/gtop-${VERSION_NAME}.dmg"
          bash tools/create_dmg.sh "$APP_PATH" "$OUTPUT_PATH" "gtop"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: gtop-dmg
          path: dist/*.dmg

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
